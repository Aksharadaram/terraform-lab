name: Terraform CI

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Run Terraform Validation and Plan
        run: |
          for dir in assignment-*; do
            echo "Running Terraform checks in $dir"

            cd $dir

            terraform init -backend=false

            terraform validate

            echo "Running terraform plan (may skip if provider unavailable)"
            terraform plan || echo "Terraform plan skipped in CI for $dir"

            cd ..
          done
