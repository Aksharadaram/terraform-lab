name: Terraform Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Format Check (assignment-1)
        run: terraform fmt -check
        working-directory: ./assignment-1

      - name: Terraform Init (assignment-1)
        run: terraform init
        working-directory: ./assignment-1

      - name: Terraform Validate (assignment-1)
        run: terraform validate
        working-directory: ./assignment-1

      - name: Terraform Format Check (assignment-2)
        run: terraform fmt -check
        working-directory: ./assignment-2

      - name: Terraform Init (assignment-2)
        run: terraform init
        working-directory: ./assignment-2

      - name: Terraform Validate (assignment-2)
        run: terraform validate
        working-directory: ./assignment-2

      - name: Terraform Format Check (assignment-3)
        run: terraform fmt -check
        working-directory: ./assignment-3

      - name: Terraform Init (assignment-3)
        run: terraform init
        working-directory: ./assignment-3

      - name: Terraform Validate (assignment-3)
        run: terraform validate
        working-directory: ./assignment-3

      - name: Terraform Format Check (assignment-4)
        run: terraform fmt -check
        working-directory: ./assignment-4

      - name: Terraform Init (assignment-4)
        run: terraform init
        working-directory: ./assignment-4

      - name: Terraform Validate (assignment-4)
        run: terraform validate
        working-directory: ./assignment-4
